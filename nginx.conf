worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/vnd.ms-fontobject application/x-font-ttf font/opentype image/svg+xml;
    gzip_comp_level 6;
    gzip_proxied any;

    # Rate limiting for millions of users
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    server {
        listen 8080;
        server_name localhost;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
            
            # Cache HTML with shorter time
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Cache static assets (long-term)
        location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|css|js|webmanifest)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # Proxy API requests to the backend server
        location /share {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://biblical-canvas-backend:8284/share;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 50M;
        }

        location /login {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://biblical-canvas-backend:8284/login;
            proxy_set_header Host $host;
        }

        location /list {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://biblical-canvas-backend:8284/list;
            proxy_set_header Host $host;
        }

        location /uploads {
            proxy_pass http://biblical-canvas-backend:8284/uploads;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://biblical-canvas-backend:8284/health;
            proxy_set_header Host $host;
        }
    }
}
